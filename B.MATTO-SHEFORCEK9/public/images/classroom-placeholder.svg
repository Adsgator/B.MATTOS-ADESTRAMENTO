<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background com degradado -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d23;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGradient)" />

  <!-- Grid sutil -->
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#grid)" />

  <!-- Placeholder text -->
  <g text-anchor="middle" dominant-baseline="middle">
    <!-- Icon camera -->
    <circle cx="960" cy="480" r="100" fill="none" stroke="#ff4d00" stroke-width="3" opacity="0.3" />
    <path d="M 920 480 Q 920 460 940 460 L 980 460 Q 1000 460 1000 480 L 1000 520 Q 1000 540 980 540 L 940 540 Q 920 540 920 520 Z"
          fill="none" stroke="#ff4d00" stroke-width="3" opacity="0.3" />
    <circle cx="960" cy="500" r="20" fill="none" stroke="#ff4d00" stroke-width="3" opacity="0.3" />

    <!-- Text -->
    <text x="960" y="620" font-family="DM Sans, sans-serif" font-size="48" fill="#ff4d00" opacity="0.6" font-weight="bold">
      Imagem da Galeria
    </text>
    <text x="960" y="680" font-family="DM Sans, sans-serif" font-size="32" fill="rgba(255,255,255,0.4)">
      1920 x 1080px (16:9)
    </text>
  </g>
</svg>
