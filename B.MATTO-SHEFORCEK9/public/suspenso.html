<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Site temporariamente indisponível</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      --primary: #ff4d00;
      --dark: #1a1d23;
      --bg: #fbf7f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--dark);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      line-height: 1.6;
    }
    .card { max-width: 520px; }
    .logo { width: 180px; height: auto; margin: 0 auto 2.5rem; display: block; opacity: 0.95; }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.25rem);
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }
    p { font-size: 1.05rem; opacity: 0.8; margin-bottom: 0.75rem; }
    .accent { height: 3px; width: 60px; background: var(--primary); margin: 2rem auto; border-radius: 2px; }
    .footer { margin-top: 2.5rem; font-size: 0.85rem; opacity: 0.5; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/logo-suspenso.svg" alt="She ForceK9" width="180" height="60" />
    <h1>Site temporariamente indisponível</h1>
    <div class="accent"></div>
    <p>Esta página está fora do ar no momento.</p>
    <p>Estamos trabalhando para normalizar o acesso o mais breve possível.</p>
    <p class="footer">Em caso de dúvidas, entre em contato com o responsável pelo site.</p>
  </main>
</body>
</html>
