<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Fundo degradado -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252830;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Padrão decorativo sutil -->
  <g opacity="0.05">
    <circle cx="100" cy="100" r="80" stroke="#ff4d00" stroke-width="2" fill="none"/>
    <circle cx="1100" cy="530" r="120" stroke="#ff4d00" stroke-width="2" fill="none"/>
  </g>

  <!-- Título principal -->
  <text x="600" y="160" font-family="Bebas Neue, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#ffffff" letter-spacing="2">
    SheForceK9
  </text>

  <!-- Subtítulo -->
  <text x="600" y="240" font-family="DM Sans, sans-serif" font-size="42" text-anchor="middle" fill="#ff6e33" font-weight="300">
    Guarda e Proteção para Mulheres
  </text>

  <!-- Descrição -->
  <text x="600" y="340" font-family="DM Sans, sans-serif" font-size="28" text-anchor="middle" fill="#ffffff" opacity="0.8">
    Aprenda a ter segurança real nas ruas
  </text>

  <text x="600" y="390" font-family="DM Sans, sans-serif" font-size="28" text-anchor="middle" fill="#ffffff" opacity="0.8">
    com um cão de proteção ao seu lado
  </text>

  <!-- Data e local -->
  <g>
    <rect x="350" y="480" width="500" height="80" rx="8" fill="#ff4d00" opacity="0.15"/>
    <text x="600" y="520" font-family="DM Sans, sans-serif" font-size="24" text-anchor="middle" fill="#ff6e33" font-weight="600">
      09 a 12 de Julho / 2026 • São José dos Campos/SP
    </text>
  </g>

  <!-- Logo/badge -->
  <circle cx="1100" cy="80" r="50" fill="#ff4d00" opacity="0.2"/>
  <text x="1100" y="95" font-family="Bebas Neue, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#ff6e33">
    K9
  </text>
</svg>
